<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スコア入力</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #f0f4f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 28px 24px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.10);
    }
    .header { text-align: center; margin-bottom: 24px; }
    .header .icon { font-size: 40px; }
    .header h1 { font-size: 20px; font-weight: 700; color: #1a1a1a; margin-top: 8px; }
    .header p { font-size: 13px; color: #888; margin-top: 4px; }
    .field { margin-bottom: 18px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }
    input {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid #ddd; border-radius: 10px;
      font-size: 16px; color: #1a1a1a;
      transition: border-color 0.2s; -webkit-appearance: none;
    }
    input:focus { outline: none; border-color: #06C755; }
    .hint { font-size: 11px; color: #aaa; margin-top: 4px; }
    .btn {
      width: 100%; padding: 14px;
      background: #06C755; color: white;
      border: none; border-radius: 10px;
      font-size: 16px; font-weight: 700;
      cursor: pointer; margin-top: 8px;
    }
    .btn:disabled { background: #aaa; cursor: not-allowed; }
    .msg { text-align: center; font-size: 14px; margin-top: 16px; min-height: 20px; color: #06C755; }
    .msg.error { color: #e53935; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="icon">⛳</div>
      <h1>スコア入力</h1>
      <p>ラウンド結果を登録してください</p>
    </div>
    <div class="field">
      <label>スコア</label>
      <input type="number" id="score" placeholder="例：85" min="40" max="150">
    </div>
    <div class="field">
      <label>コースレーティング（CR）</label>
      <input type="number" id="cr" placeholder="例：70.5" step="0.1" min="60" max="80">
      <div class="hint">※コースのスコアカードに記載されています</div>
    </div>
    <div class="field">
      <label>コース名</label>
      <input type="text" id="course" placeholder="例：武蔵野CC">
    </div>
    <button class="btn" id="submitBtn" onclick="submitScore()">送信する</button>
    <div class="msg" id="msg"></div>
  </div>
  <script>
    let userId = '', userName = '', groupId = '';
    liff.init({ liffId: '2009932306-VST4Bmqj' })
      .then(() => {
        if (!liff.isLoggedIn()) { liff.login(); return; }
        return liff.getProfile();
      })
      .then(profile => {
        if (!profile) return;
        userId = profile.userId;
        userName = profile.displayName;
        const ctx = liff.getContext();
       const urlParams = new URLSearchParams(window.location.search);
        groupId = urlParams.get('groupId') || (ctx && ctx.groupId) ? (urlParams.get('groupId') || ctx.groupId) : '';
      });

    async function submitScore() {
      const score = document.getElementById('score').value;
      const cr = document.getElementById('cr').value;
      const course = document.getElementById('course').value.trim();
      const btn = document.getElementById('submitBtn');
      const msg = document.getElementById('msg');
      if (!score || !cr || !course) {
        msg.textContent = '全ての項目を入力してください';
        msg.className = 'msg error'; return;
      }
      btn.disabled = true; btn.textContent = '送信中...'; msg.textContent = '';
      try {
        const res = await fetch('/submit_score', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId, userName, groupId, score: Number(score), cr: Number(cr), course })
        });
        if (res.ok) {
          msg.textContent = '✅ 登録完了！グループに結果を送りました';
          msg.className = 'msg';
          document.getElementById('score').value = '';
          document.getElementById('cr').value = '';
          document.getElementById('course').value = '';
          setTimeout(() => liff.closeWindow(), 2000);
        } else { throw new Error('送信失敗'); }
      } catch(e) {
        msg.textContent = '❌ エラーが発生しました。もう一度お試しください';
        msg.className = 'msg error';
        btn.disabled = false; btn.textContent = '送信する';
      }
    }
  </script>
</body>
</html>
