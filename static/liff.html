<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ゴルフスコア管理</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #f0f4f0;
      min-height: 100vh;
      padding: 20px;
    }
    .tab-bar {
      display: flex;
      background: white;
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .tab-btn {
      flex: 1; padding: 10px;
      border: none; background: none;
      border-radius: 8px;
      font-size: 14px; font-weight: 600;
      cursor: pointer; color: #888;
    }
    .tab-btn.active { background: #06C755; color: white; }
    .card {
      background: white;
      border-radius: 16px;
      padding: 28px 24px;
      width: 100%;
      max-width: 380px;
      margin: 0 auto;
      box-shadow: 0 4px 20px rgba(0,0,0,0.10);
    }
    .header { text-align: center; margin-bottom: 24px; }
    .header .icon { font-size: 40px; }
    .header h1 { font-size: 20px; font-weight: 700; color: #1a1a1a; margin-top: 8px; }
    .header p { font-size: 13px; color: #888; margin-top: 4px; }
    .field { margin-bottom: 18px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }
    input {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid #ddd; border-radius: 10px;
      font-size: 16px; color: #1a1a1a;
      transition: border-color 0.2s; -webkit-appearance: none;
    }
    input:focus { outline: none; border-color: #06C755; }
    .hint { font-size: 11px; color: #aaa; margin-top: 4px; }
    .btn {
      width: 100%; padding: 14px;
      background: #06C755; color: white;
      border: none; border-radius: 10px;
      font-size: 16px; font-weight: 700;
      cursor: pointer; margin-top: 8px;
    }
    .btn:disabled { background: #aaa; cursor: not-allowed; }
    .msg { text-align: center; font-size: 14px; margin-top: 16px; min-height: 20px; color: #06C755; }
    .msg.error { color: #e53935; }
    .score-item {
      border: 1px solid #eee;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .score-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }
    .score-name { font-weight: 700; font-size: 15px; }
    .delete-btn {
      background: #e53935; color: white;
      border: none; border-radius: 6px;
      padding: 4px 10px; font-size: 12px;
      cursor: pointer;
    }
    .score-detail { font-size: 12px; color: #666; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .loading { text-align: center; color: #888; padding: 20px; }
  </style>
</head>
<body>
  <div style="max-width:380px; margin:0 auto;">
    <div class="tab-bar">
      <button class="tab-btn active" onclick="showTab('input')">⛳ スコア入力</button>
      <button class="tab-btn" onclick="showTab('history')">📋 履歴確認</button>
    </div>

    <div id="tab-input" class="tab-content active">
      <div class="card">
        <div class="header">
          <div class="icon">⛳</div>
          <h1>スコア入力</h1>
          <p>ラウンド結果を登録してください</p>
        </div>
        <div class="field">
          <label>スコア</label>
          <input type="number" id="score" placeholder="例：85" min="40" max="150">
        </div>
        <div class="field">
          <label>コースレーティング（CR）</label>
          <input type="number" id="cr" placeholder="例：70.5" step="0.1" min="60" max="80">
          <div class="hint">※コースのスコアカードに記載されています</div>
        </div>
        <div class="field">
          <label>コース名</label>
          <input type="text" id="course" placeholder="例：武蔵野CC">
        </div>
        <button class="btn" id="submitBtn" onclick="submitScore()">送信する</button>
        <div class="msg" id="msg"></div>
      </div>
    </div>

    <div id="tab-history" class="tab-content">
      <div class="card">
        <div class="header">
          <div class="icon">📋</div>
          <h1>スコア履歴</h1>
          <p>登録済みのスコア一覧</p>
        </div>
        <div id="historyList"><div class="loading">読み込み中...</div></div>
      </div>
    </div>
  </div>

  <script>
    let userId = '', userName = '', groupId = '';

    liff.init({ liffId: '2009932306-VST4Bmqj' })
      .then(() => {
        if (!liff.isLoggedIn()) { liff.login(); return; }
        return liff.getProfile();
      })
      .then(profile => {
        if (!profile) return;
        userId = profile.userId;
        userName = profile.displayName;
        const ctx = liff.getContext();
        const urlParams = new URLSearchParams(window.location.search);
        groupId = urlParams.get('groupId') || (ctx && ctx.groupId) || '';
      });

    function showTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      event.target.classList.add('active');
      if (tab === 'history') loadHistory();
    }

    async function loadHistory() {
      const list = document.getElementById('historyList');
      list.innerHTML = '<div class="loading">読み込み中...</div>';
      try {
        const res = await fetch('/get_scores?groupId=' + encodeURIComponent(groupId));
        const rows = await res.json();
        if (rows.length === 0) {
          list.innerHTML = '<div class="loading">スコアがありません</div>';
          return;
        }
        list.innerHTML = rows.map(r => `
          <div class="score-item">
            <div class="score-item-header">
              <span class="score-name">${r.display_name}</span>
              <button class="delete-btn" onclick="deleteScore(${r.id})">削除</button>
            </div>
            <div class="score-detail">
              ${r.date} ／ ${r.course} ／ スコア ${r.score} ／ CR ${r.cr}
            </div>
          </div>
        `).join('');
      } catch(e) {
        list.innerHTML = '<div class="loading">読み込みエラー</div>';
      }
    }

    async function deleteScore(id) {
      if (!confirm('このスコアを削除しますか？')) return;
      try {
        const res = await fetch('/delete_score', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id, groupId })
        });
        if (res.ok) loadHistory();
      } catch(e) {
        alert('削除に失敗しました');
      }
    }

    async function submitScore() {
      const score = document.getElementById('score').value;
      const cr = document.getElementById('cr').value;
      const course = document.getElementById('course').value.trim();
      const btn = document.getElementById('submitBtn');
      const msg = document.getElementById('msg');
      if (!score || !cr || !course) {
        msg.textContent = '全ての項目を入力してください';
        msg.className = 'msg error'; return;
      }
      btn.disabled = true; btn.textContent = '送信中...'; msg.textContent = '';
      try {
        const res = await fetch('/submit_score', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId, userName, groupId, score: Number(score), cr: Number(cr), course })
        });
        if (res.ok) {
          msg.textContent = '✅ 登録完了！グループに結果を送りました';
          msg.className = 'msg';
          document.getElementById('score').value = '';
          document.getElementById('cr').value = '';
          document.getElementById('course').value = '';
          setTimeout(() => liff.closeWindow(), 2000);
        } else { throw new Error('送信失敗'); }
      } catch(e) {
        msg.textContent = '❌ エラーが発生しました。もう一度お試しください';
        msg.className = 'msg error';
        btn.disabled = false; btn.textContent = '送信する';
      }
    }
  </script>
</body>
</html>
